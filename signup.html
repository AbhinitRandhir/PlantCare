<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup | PlantCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <!-- ==========================
        Navbar Start
========================== -->

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">

        <div class="container">

            <!-- Logo -->

            <a class="navbar-brand" href="index.html">

                🌱 PlantCare

            </a>

            <!-- Mobile Toggle -->

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">

                        <a class="nav-link" href="index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="plants.html">

                            Plants

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="care-list.html">

                            Care List

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="about.html">

                            About

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="contact.html">

                            Contact

                        </a>

                    </li>


                    <!-- Guest -->

                    <li class="nav-item dropdown ms-lg-3" id="guestMenu">

                        <button class="btn dropdown-toggle" data-bs-toggle="dropdown">

                            Get Started

                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>

                                <a class="dropdown-item" href="login.html">

                                    <i class="fa-solid fa-right-to-bracket me-2"></i>

                                    Login

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item" href="signup.html">

                                    <i class="fa-solid fa-user-plus me-2"></i>

                                    Signup

                                </a>

                            </li>

                        </ul>

                    </li>


                    <!-- Logged In -->

                    <li class="nav-item dropdown d-none ms-lg-3" id="userMenu">

                        <button class="btn dropdown-toggle" data-bs-toggle="dropdown">

                            <i class="fa-solid fa-user me-2"></i>

                            <span id="userName"></span>

                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>

                                <a class="dropdown-item" href="#" id="logoutBtn">

                                    <i class="fa-solid fa-right-from-bracket me-2"></i>

                                    Logout

                                </a>

                            </li>

                        </ul>

                    </li>


                    <!-- Theme -->

                    <li class="nav-item ms-lg-3">

                        <button class="btn btn-outline-success" id="themeBtn">

                            <i class="fa-solid fa-moon"></i>

                        </button>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ==========================
        Navbar End
========================== -->


    <!--==============================
        SIGNUP
==============================-->

    <section class="auth-section">

        <div class="container">

            <div class="auth-card" data-aos="zoom-in">

                <div class="auth-logo">

                    🌱

                </div>

                <h2>Create Account</h2>

                <p>

                    Join PlantCare and start your plant care journey.

                </p>

                <form id="signupForm">

                    <!-- Full Name -->

                    <div class="mb-3">

                        <label class="form-label">

                            Full Name

                        </label>

                        <input type="text" class="form-control" id="signupName" placeholder="Enter your full name"
                            required>

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <input type="email" class="form-control" id="signupEmail" placeholder="Enter your email"
                            required>

                    </div>

                    <!-- Password -->

                    <div class="mb-3">

                        <label>Password</label>

                        <div class="position-relative">

                            <input type="password" id="signupPassword" class="form-control pe-5" required>

                            <button type="button" class="togglePassword" data-target="signupPassword">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Confirm Password -->

                    <div class="mb-4">

                        <label>Confirm Password</label>

                        <div class="position-relative">

                            <input type="password" id="confirmPassword" class="form-control pe-5" required>

                            <button type="button" class="togglePassword" data-target="confirmPassword">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>
                    <!-- Button -->

                    <button type="submit" class="btn auth-btn">

                        <i class="fa-solid fa-user-plus me-2"></i>

                        Create Account

                    </button>

                </form>

                <div class="auth-link">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </section>


    <!-- Toast -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="liveToast" class="toast" role="alert">

            <div class="toast-header">

                <strong class="me-auto">

                    🌱 PlantCare

                </strong>

                <button type="button" class="btn-close" data-bs-dismiss="toast">
                </button>

            </div>

            <div class="toast-body" id="toastMessage">

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Animation -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({

            duration: 800,

            once: true,

            offset: 80,

            easing: "ease-in-out",

            mirror: false

        });
    </script>

    <script src="js/script.js"></script>

    <script src="js/auth.js"></script>

</body>

</html>l
