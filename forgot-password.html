        </div>

    <!-- ==========================
            FORGOT PASSWORD
    ========================== -->

    <section class="auth-section">

        <div class="container">

            <div class="auth-card">

                <h2>Forgot Password</h2>

                <p>
                    Enter your registered email address.
                </p>

                <form id="forgotForm">

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <input type="email"
                            id="forgotEmail"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <button class="btn auth-btn w-100">

                        Reset Password

                    </button>

                </form>

                <div class="text-center mt-4">

                    <a href="login.html"
                        class="text-success">

                        ← Back to Login

                    </a>

                </div>

            </div>

        </div>
