<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | PlantCare</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

    <!-- <link rel="icon" href="images/logo.png"> -->

</head>

<body>

    <!-- ==========================
        Navbar Start
========================== -->

   <nav class="navbar navbar-expand-lg navbar-light sticky-top">

        <div class="container">

            <!-- Logo -->

            <a class="navbar-brand" href="index.html">

                🌱 PlantCare

            </a>

            <!-- Mobile Toggle -->

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">

                        <a class="nav-link active" href="index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="plants.html">

                            Plants

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="care-list.html">

                            Care List

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="about.html">

                            About

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="contact.html">

                            Contact

                        </a>

                    </li>


                    <!-- Guest -->

                    <li class="nav-item dropdown ms-lg-3" id="guestMenu">

                        <button class="btn dropdown-toggle" data-bs-toggle="dropdown">

                            Get Started

                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>

                                <a class="dropdown-item" href="login.html">

                                    <i class="fa-solid fa-right-to-bracket me-2"></i>

                                    Login

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item" href="signup.html">

                                    <i class="fa-solid fa-user-plus me-2"></i>

                                    Signup

                                </a>

                            </li>

                        </ul>

                    </li>


                    <!-- Logged In -->

                    <li class="nav-item dropdown d-none ms-lg-3" id="userMenu">

                        <button class="btn dropdown-toggle" data-bs-toggle="dropdown">

                            <i class="fa-solid fa-user me-2"></i>

                            <span id="userName"></span>

                        </button>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>

                                <a class="dropdown-item" href="#" id="logoutBtn">

                                    <i class="fa-solid fa-right-from-bracket me-2"></i>

                                    Logout

                                </a>

                            </li>

                        </ul>

                    </li>


                    <!-- Theme -->

                    <li class="nav-item ms-lg-3">

                        <button class="btn btn-outline-success" id="themeBtn">

                            <i class="fa-solid fa-moon"></i>

                        </button>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ==========================
        Navbar End
========================== -->



    <!-- ==========================
            LOGIN
    =========================== -->

    <section class="auth-section">

        <div class="container">

            <div class="auth-card">

                <div class="auth-logo">

                    🌱

                </div>

                <h2>Welcome Back</h2>

                <p>

                    Login to continue your PlantCare journey.

                </p>

                <form id="loginForm">

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email"
                            required>

                    </div>



                    <!-- Password -->

                    <div class="mb-4">

                        <label>Password</label>

                        <div class="position-relative">

                            <input type="password" class="form-control pe-5" id="loginPassword"
                                placeholder="Enter your password" required>

                            <button type="button" class="togglePassword" data-target="loginPassword">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>


                    <!-- Forgot Password -->

                    <div class="forgot-password">

                        <a href="forgot-password.html">

                            <i class="fa-solid fa-key me-1"></i>

                            Forgot Password?

                        </a>

                    </div>



                    <!-- Login Button -->

                    <button type="submit" class="btn auth-btn">

                        <i class="fa-solid fa-right-to-bracket me-2"></i>

                        Login

                    </button>

                </form>



                <!-- Signup -->

                <div class="auth-link">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </section>



    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="js/script.js"></script>

    <script src="js/auth.js"></script>

</body>

</html>
